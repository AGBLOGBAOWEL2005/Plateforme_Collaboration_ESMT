<div class="flex flex-col h-full bg-[#f8fafc] p-8 overflow-hidden">
  <div class="flex items-center justify-between mb-8">
    <div class="flex items-center gap-4">
      <h1 class="text-2xl font-bold text-gray-800">Vos Notifications</h1>
      
      <!-- Barre de recherche -->
      <div class="ml-4 flex items-center bg-white rounded-2xl px-4 py-2 w-64 shadow-sm border border-gray-100 focus-within:ring-2 focus-within:ring-indigo-500/20 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 mr-2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Rechercher une notification..." class="bg-transparent border-none outline-none text-xs w-full" 
               [ngModel]="recherche()" (ngModelChange)="recherche.set($event)" />
      </div>
    </div>
    
    <button (click)="recupererNotifications()" class="p-2 text-gray-400 hover:text-indigo-600 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
    </button>
  </div>

  <div class="flex-1 overflow-y-auto pr-2 space-y-4 custom-scrollbar">
    <div *ngIf="listeNotifications().length === 0" class="text-center py-20 text-gray-400 italic">
      Aucune notification pour le moment.
    </div>

    <div *ngFor="let n of notificationsFiltrees()" 
         (click)="marquerCommeLu(n)"
         class="p-5 rounded-[1.5rem] bg-white border border-gray-100 shadow-sm transition-all hover:shadow-md cursor-pointer relative overflow-hidden"
         [ngClass]="{'border-l-4 border-l-indigo-500': !n.lu}">
      <div class="flex items-start gap-4">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
             [ngClass]="n.lu ? 'bg-gray-50 text-gray-400' : 'bg-indigo-50 text-indigo-500'">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        </div>
        <div class="flex-1">
          <p class="text-sm font-medium leading-relaxed" [ngClass]="n.lu ? 'text-gray-500' : 'text-gray-800'">
            {{ n.notification }}
          </p>
          <p class="text-[10px] text-gray-400 mt-2">{{ n.date_notification | date:'dd MMM yyyy HH:mm' }}</p>
        </div>
        <div class="flex flex-col items-center gap-2">
          <div *ngIf="!n.lu" class="w-2 h-2 bg-red-500 rounded-full"></div>
          <button (click)="$event.stopPropagation(); supprimerNotification(n.id)" 
                  class="p-2 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all" 
                  title="Supprimer">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
