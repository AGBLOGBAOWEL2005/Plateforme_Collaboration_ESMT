<div class="flex h-screen">

  <!-- Partie gauche -->
  <div class="w-1/2 bg-white-600 text-black flex flex-col justify-center items-center p-10">

    <h1 class="text-5xl font-bold mb-6 text-center">
      CollabSpace 
    </h1>

    <p class="text-2xl text-center mb-8">
      Gérez vos projets  <br>
      Collaborez avec votre équipe  <br>
      Discutez en temps réel 
    </p>

    <img
      src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d"
      class="rounded-xl shadow-lg w-96"
    />

    <p class="mt-6 text-lg text-center">
      Travaillez plus efficacement avec votre équipe 
    </p>

  </div>


  <!-- Partie droite -->
  <div class="w-1/2 flex justify-center items-center bg-gray-100">

    <div class="bg-white shadow-xl rounded-2xl p-12 w-[500px]">

      <h2 class="text-3xl font-bold mb-8 text-center">
        Connexion 
      </h2>

      <form (ngSubmit)="login()" class="space-y-6">

        <div *ngIf="errorMsg" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
          {{ errorMsg }}
        </div>

        <input
          type="text"
          placeholder="Nom d'utilisateur"
          [(ngModel)]="form.username"
          name="username"
          required
          class="w-full p-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        <input
          type="password"
          placeholder="Mot de passe"
          [(ngModel)]="form.password"
          name="password"
          required
          class="w-full p-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        <button
          type="submit"
          class="w-full bg-blue-600 text-white p-4 rounded-lg text-lg font-semibold hover:bg-blue-700 transition"
        >
          Se connecter
        </button>

      </form>

      <p class="text-center mt-6 text-gray-600">
        Pas encore de compte ?
      </p>

      <button
        routerLink="/register"
        class="mt-3 w-full border border-blue-600 text-blue-600 p-4 rounded-lg hover:bg-blue-50"
      >
        Créer un compte 
      </button>

    </div>

  </div>

</div>
