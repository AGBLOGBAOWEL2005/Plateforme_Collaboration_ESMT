<div class="flex min-h-screen bg-gray-50">

  <!-- Partie gauche -->
  <div class="w-1/2 bg-gradient-to-br from-purple-700 to-indigo-700 text-white flex flex-col justify-center items-center px-16">

    <h1 class="text-4xl font-bold mb-6">
      CollabSpace
    </h1>

    <p class="text-lg text-center leading-relaxed max-w-md mb-10">
      Une plateforme moderne pour organiser vos projets,
      collaborer avec votre équipe et suivre l'avancement
      de vos tâches en toute simplicité.
    </p>

    <img
      src="https://images.unsplash.com/photo-1552664730-d307ca884978"
      class="rounded-xl shadow-2xl w-[420px] object-cover"
    />

  </div>


  <!-- Partie droite -->
  <div class="w-1/2 flex justify-center items-center px-12">

    <div class="bg-white shadow-2xl rounded-xl p-12 w-[520px]">

      <h2 class="text-2xl font-semibold text-gray-800 mb-8 text-center">
        Créer un compte
      </h2>

      <form (ngSubmit)="register()" class="space-y-6">

        <div *ngIf="errorMsg" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
          {{ errorMsg }}
        </div>

        <!-- Nom -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">
            Nom
          </label>

          <input
            type="text"
            [(ngModel)]="form.nom"
            name="nom"
            required
            class="w-full border border-gray-300 p-3 rounded-md focus:ring-2 focus:ring-purple-600 focus:border-purple-600 outline-none"
          />
        </div>


        <!-- Prenom -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">
            Prénom
          </label>

          <input
            type="text"
            [(ngModel)]="form.prenom"
            name="prenom"
            required
            class="w-full border border-gray-300 p-3 rounded-md focus:ring-2 focus:ring-purple-600 focus:border-purple-600 outline-none"
          />
        </div>


        <!-- Username -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">
            Nom d'utilisateur
          </label>

          <input
            type="text"
            [(ngModel)]="form.username"
            name="username"
            required
            class="w-full border border-gray-300 p-3 rounded-md focus:ring-2 focus:ring-purple-600 focus:border-purple-600 outline-none"
          />
        </div>


        <!-- Email -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">
            Adresse email
          </label>

          <input
            type="email"
            [(ngModel)]="form.email"
            name="email"
            required
            class="w-full border border-gray-300 p-3 rounded-md focus:ring-2 focus:ring-purple-600 focus:border-purple-600 outline-none"
          />
        </div>


        <!-- Password -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">
            Mot de passe
          </label>

          <input
            type="password"
            [(ngModel)]="form.password"
            name="password"
            required
            class="w-full border border-gray-300 p-3 rounded-md focus:ring-2 focus:ring-purple-600 focus:border-purple-600 outline-none"
          />
        </div>


        <button
          type="submit"
          class="w-full bg-purple-700 text-white py-3 rounded-md font-medium hover:bg-purple-800 transition"
        >
          Créer le compte
        </button>

      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Vous avez déjà un compte ?
      </p>

      <button
        routerLink="/login"
        class="w-full mt-3 border border-gray-300 py-3 rounded-md hover:bg-gray-100 transition"
      >
        Se connecter
      </button>

    </div>

  </div>

</div>
